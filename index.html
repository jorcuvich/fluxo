<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lógica Flow - Versão Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="mobile-menu-btn" onclick="toggleSidebar()">☰ Menu</button>

    <div id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Ferramentas</h3>
            <button onclick="toggleSidebar()" style="width:auto; padding:5px 10px; background:transparent; border:1px solid #555; display:none;" class="close-mobile">X</button>
        </div>
        <div>
            <button onclick="addNode('inicio')">INÍCIO</button>
            <button onclick="addNode('entrada')">LEIA (Entrada)</button>
            <button onclick="addNode('processo')">ATRIBUIÇÃO (Processo)</button>
            <button onclick="addNode('decisao')">SE / ENQUANTO (Decisão)</button>
            <button onclick="addNode('saida')">ESCREVA (Saída)</button>
            <button onclick="addNode('fim')">FIM</button>
        </div>
        <div>
            <h3>Memória</h3>
            <div id="memory-ui" class="memory-box">Variáveis limpas...</div>
        </div>
        <div>
            <h3>Execução</h3>
            <button id="btn-next" class="btn-exec" onclick="runStep()">Próximo Passo ➡</button>
            <button onclick="resetExecution()">Parar / Limpar</button>
        </div>
    </div>

    <div id="camera" onpointermove="canvasMove(event)" onpointerup="canvasUp(event)">
        <div id="connecting-indicator">Conecte à porta azul...</div>
        
        <div id="workspace">
            <svg id="svg-layer"></svg>
            <svg id="anim-layer"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <div id="zoom-controls">
        <button onclick="changeZoom(-0.1)">-</button>
        <button onclick="resetZoom()">1x</button>
        <button onclick="changeZoom(0.1)">+</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
