<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lógica Flow - Simulador Educacional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="mobile-menu-btn" onclick="toggleSidebar()">☰ Menu</button>

    <div id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;">Componentes</h3>
            <button onclick="toggleSidebar()" style="width:auto; padding:5px 10px; background:transparent; border:1px solid #555; display:none;" class="close-mobile">X</button>
        </div>
        
        <div class="ferramentas-grupo">
            <div class="grupo-titulo">Controle de Fluxo</div>
            <button class="btn-shape btn-terminal" onclick="addNode('inicio')">INÍCIO</button>
            <button class="btn-shape btn-terminal" onclick="addNode('fim')">FIM</button>
            
            <div class="grupo-titulo">Lógica</div>
            <button class="btn-shape btn-processo" onclick="addNode('processo')">PROCESSAMENTO</button>
            <button class="btn-shape btn-decisao" onclick="addNode('decisao')"><span>DECISÃO</span></button>
            
            <div class="grupo-titulo">Entrada & Saída</div>
            <button class="btn-shape btn-io" onclick="addNode('entrada')"><span>E/S GENÉRICA</span></button>
            <button class="btn-shape btn-entradamanual" onclick="addNode('entradamanual')"><span>TECLADO</span></button>
            <button class="btn-shape btn-exibir" onclick="addNode('exibir')">TELA</button>
            <button class="btn-shape btn-relatorio" onclick="addNode('relatorio')">RELATÓRIO</button>

            <div class="grupo-titulo">Roteamento</div>
            <button class="btn-shape btn-desvio" onclick="addNode('desvio')" title="Ponto de Desvio"></button>
        </div>

        <div>
            <h3>Memória RAM</h3>
            <div id="memory-ui" class="memory-box">Variáveis limpas...</div>
        </div>
        <div>
            <h3>Motor de Execução</h3>
            <button id="btn-next" class="btn-exec" onclick="runStep()">Próximo Passo ➡</button>
            <button class="btn-reset" onclick="resetExecution()">Parar Execução</button>
        </div>

        <div class="ferramentas-grupo">
            <div class="grupo-titulo">Projeto</div>
            <button onclick="limparTela()" style="background: #f38ba8; color: #111; width: 100%; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 8px;">🗑️ Limpar Tela</button>
            <button onclick="exportarProjeto()" style="background: #585b70; width: 100%; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 8px;">💾 Salvar (.json)</button>
            <label for="upload-file" class="btn-custom-upload">📂 Abrir (.json)</label>
            <input type="file" id="upload-file" accept=".json" onchange="importarProjeto(event)" style="display:none;">
        </div>
    </div>

    <div id="camera" onpointermove="canvasMove(event)" onpointerup="canvasUp(event)">
        <div id="connecting-indicator">Conecte à porta azul...</div>
        
        <div id="workspace">
            <svg id="svg-layer"></svg>
            <svg id="anim-layer"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <div id="zoom-controls">
        <button onclick="changeZoom(-0.1)">-</button>
        <button onclick="resetZoom()">1x</button>
        <button onclick="changeZoom(0.1)">+</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
